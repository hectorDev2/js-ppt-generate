<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JSON Document Runtime</title>
<link rel="stylesheet" href="/src/style.css">
</head>
<body>

<header>
  <h1>JSON Document Runtime</h1>
  <span>JSON Schema → PPTX / PDF</span>
  <nav class="nav-links">
    <a href="/js.html">JS Mode</a>
  </nav>
</header>

<div class="main">
  <div class="editor-panel">
    <div id="editor" class="editor-container"></div>
    <div class="controls">
      <button class="btn-run" id="runBtn">▶ Compilar</button>
      <button class="btn-dl" id="pptxBtn" disabled>⬇ PPTX</button>
      <button class="btn-dl" id="pdfBtn" disabled>⬇ PDF</button>
    </div>
  </div>
  <div class="log-panel" id="logPanel">
    <div class="log-header">
      <button class="tab-btn tab-active" data-tab="logs">Logs</button>
      <button class="tab-btn" data-tab="preview">Preview</button>
    </div>
    <div class="log-output" id="logOutput">
      <div class="log-empty">Peg&aacute; un JSON Schema Universal y presion&aacute; <strong>Compilar</strong></div>
    </div>
    <div class="preview-output" id="previewOutput" style="display:none">
      <div class="preview-empty">Compil&aacute; el JSON para ver la vista previa</div>
    </div>
  </div>
</div>

<template id="previewAppTmpl">
  <div class="preview-app">
    <div class="preview-main">
      <div class="preview-viewport" id="previewViewport"></div>
    </div>
    <div class="preview-controls">
      <button class="preview-nav" id="prevSlide" title="Anterior (←)">&larr;</button>
      <span class="preview-counter" id="slideCounter">1 / 1</span>
      <button class="preview-nav" id="nextSlide" title="Siguiente (→)">&rarr;</button>
      <div class="preview-zoom">
        <button class="preview-zoom-btn" data-zoom="fit">Fit</button>
        <button class="preview-zoom-btn" data-zoom="100">100%</button>
        <button class="preview-zoom-btn" data-zoom="75">75%</button>
        <button class="preview-zoom-btn" data-zoom="50">50%</button>
      </div>
    </div>
    <div class="preview-thumbs" id="previewThumbs"></div>
  </div>
</template>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
